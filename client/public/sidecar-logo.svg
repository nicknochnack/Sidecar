<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main motorcycle body -->
  <path d="M8 20 L16 20 L18 16 L22 16 L24 20 L32 20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Sidecar attachment -->
  <rect x="4" y="18" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="2" fill="none"/>
  
  <!-- Main wheel -->
  <circle cx="28" cy="28" r="6" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <circle cx="28" cy="28" r="2" fill="currentColor"/>
  
  <!-- Sidecar wheel -->
  <circle cx="8" cy="28" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
  <circle cx="8" cy="28" r="1.5" fill="currentColor"/>
  
  <!-- Connection struts -->
  <line x1="8" y1="26" x2="8" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="22" x2="28" y2="20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Handlebars accent -->
  <path d="M22 16 L22 12 L24 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

